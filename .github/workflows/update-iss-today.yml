name: Update ISS Today Log

on:
  schedule:
    # Runs every day at 12:00 UTC
    - cron: "0 12 * * *"
  workflow_dispatch:
    # Also allows manual trigger from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit the updated iss-today.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch ISS crew and activity, write iss-today.json
        run: python scripts/update_iss_today.py

      - name: Commit updated iss-today.json (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add iss-today.json
          # Only commit if something actually changed
          git diff --cached --quiet || git commit -m "chore: update ISS today log $(date -u +'%Y-%m-%d')"
          git push
