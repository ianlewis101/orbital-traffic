name: iOS Build & Upload

# Manual trigger only — this hits App Store Connect, so it should never
# fire on a routine push. Run it from the Actions tab when you're
# ready to ship a build.
on:
  workflow_dispatch:
    inputs:
      upload:
        description: "Upload the build to App Store Connect after archiving"
        type: boolean
        default: false

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install workspace dependencies
        run: npm ci

      - name: Build web app
        run: npm run build -w @orbital-traffic/web

      - name: Sync Capacitor iOS project
        working-directory: apps/web
        run: npx cap sync ios

      # ---- Code signing ----------------------------------------------
      # Requires these repo secrets (Settings → Secrets and variables →
      # Actions). See docs/ios-ci-setup.md for how to generate each one
      # from a browser only — no Mac needed.
      #   IOS_DIST_CERTIFICATE_P12_BASE64
      #   IOS_DIST_CERTIFICATE_PASSWORD
      #   IOS_PROVISIONING_PROFILE_BASE64
      #   IOS_KEYCHAIN_PASSWORD          (any throwaway password you invent)
      #   APP_STORE_CONNECT_API_KEY_ID
      #   APP_STORE_CONNECT_API_ISSUER_ID
      #   APP_STORE_CONNECT_API_KEY_BASE64
      - name: DEBUG - check secret integrity
        env:
          P12_BASE64: ${{ secrets.IOS_DIST_CERTIFICATE_P12_BASE64 }}
        run: |
          echo "Base64 secret length (should be 4316):"
          printf '%s' "$P12_BASE64" | wc -c
          echo "Decoded p12 sha256 (should be 3292bbb695ad48f375a1bda57860dc330871b0cb4388859114ae3dc993e9d27b):"
          printf '%s' "$P12_BASE64" | tr -d '[:space:]' | base64 --decode -o /tmp/debug_cert.p12
          shasum -a 256 /tmp/debug_cert.p12
      - name: Import signing certificate & provisioning profile
        env:
          P12_BASE64: ${{ secrets.IOS_DIST_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DIST_CERTIFICATE_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
         set -euo pipefail
          P12_BASE64="$(printf '%s' "$P12_BASE64" | tr -d '[:space:]')"
          P12_PASSWORD="$(printf '%s' "$P12_PASSWORD" | tr -d '[:space:]')"
          PROFILE_BASE64="$(printf '%s' "$PROFILE_BASE64" | tr -d '[:space:]')"
          KEYCHAIN_PASSWORD="$(printf '%s' "$KEYCHAIN_PASSWORD" | tr -d '[:space:]')"

          CERT_PATH=$RUNNER_TEMP/dist_cert.p12
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$P12_BASE64" | base64 --decode -o "$CERT_PATH"
          echo -n "$PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A \
            -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')

          # Read the team ID and profile name out of the provisioning
          # profile itself, so the archive/export steps below never need
          # them hardcoded (manual signing fails without them).
          security cms -D -i "$PROFILE_PATH" > "$RUNNER_TEMP/profile.plist"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/profile.plist")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$RUNNER_TEMP/profile.plist")
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" "$RUNNER_TEMP/profile.plist")

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID.mobileprovision"

          {
            echo "PROFILE_NAME=$PROFILE_NAME"
            echo "TEAM_ID=$TEAM_ID"
          } >> "$GITHUB_ENV"

      # Capacitor 8 generates a Swift Package Manager project — there is
      # no App.xcworkspace (that was the CocoaPods layout), so build the
      # .xcodeproj directly.
      - name: Archive
        working-directory: apps/web/ios/App
        run: |
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            archive

      - name: Export IPA
        working-directory: apps/web/ios/App
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>app.orbitaltraffic</key>
              <string>${PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbital-traffic-ipa
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 14

      - name: Upload to App Store Connect
        if: ${{ inputs.upload }}
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/private_keys
          echo -n "$API_KEY_BASE64" | base64 --decode -o ~/private_keys/AuthKey_${API_KEY_ID}.p8

          IPA_PATH=$(find "$RUNNER_TEMP/export" -name "*.ipa" | head -1)
          xcrun altool --upload-app -f "$IPA_PATH" -t ios \
            --apiKey "$API_KEY_ID" --apiIssuer "$API_ISSUER_ID"
