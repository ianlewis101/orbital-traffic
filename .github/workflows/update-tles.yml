name: Update TLE Data

on:
  schedule:
    # Runs every day at 06:00 UTC (fresh data for morning traffic)
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Also allows manual trigger from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit the updated index.html

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch fresh TLEs and patch index.html
        run: python scripts/update_tles.py

      - name: Commit updated index.html (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Only commit if something actually changed
          git diff --cached --quiet || git commit -m "chore: refresh TLE data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
