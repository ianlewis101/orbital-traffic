name: Refresh ISS Today Feed

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch ISS crew + activity
        run: python tooling/refresh-iss-today.py

      - name: Commit updated feed (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/web/public/data/iss-today.json
          git diff --cached --quiet || git commit -m "chore: update ISS today feed $(date -u +'%Y-%m-%d')"
          git push
