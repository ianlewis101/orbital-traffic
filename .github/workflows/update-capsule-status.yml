name: Update Capsule Status

on:
  schedule:
    # Hourly — bounds how fast de-orbited capsules disappear and fresh
    # launches appear to ~1h (plus the Worker's 10-min /capsules TTL).
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # commits the updated capsule-status.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch capsule phase data, write capsule-status.json
        run: node tools/update-capsule-status.mjs

      - name: Commit updated capsule-status.json (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add capsule-status.json
          git diff --cached --quiet || git commit -m "chore: update capsule status $(date -u +'%Y-%m-%d %H:%M UTC')"

          # Rebase onto whatever another scheduled job may have just pushed
          # (e.g. update-iss-today.yml) and retry, instead of failing outright
          # on a losing push.
          for i in 1 2 3 4 5; do
            git pull --rebase origin main
            git push && break
          done
