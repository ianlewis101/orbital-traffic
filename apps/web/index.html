<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#05060b" />
    <meta
      name="description"
      content="Real-time 3D tracker for every satellite, space station and near-Earth object — positions computed on your device."
    />

    <title>Orbital Traffic — live space tracker</title>

    <!-- iOS PWA / Capacitor -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Orbital Traffic" />
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Orbital Traffic" />
    <meta
      property="og:description"
      content="Real-time 3D tracker for every satellite and near-Earth object."
    />
    <meta property="og:type" content="website" />

    <!-- Fonts: Space Grotesk (UI) + IBM Plex Mono (telemetry) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
