name: Update Capsule Status

on:
  schedule:
    # Every 4 hours — frequent enough to bound same-day detection latency
    # for docking/undocking transitions without polling CelesTrak for TLEs
    # that haven't meaningfully changed.
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # commits the updated capsule-status.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch capsule phase data, write capsule-status.json
        run: node tools/update-capsule-status.mjs

      - name: Commit updated capsule-status.json (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add capsule-status.json
          git diff --cached --quiet || git commit -m "chore: update capsule status $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
