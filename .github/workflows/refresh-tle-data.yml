name: Refresh TLE Data

on:
  schedule:
    # Every day at 06:00 UTC (fresh data for morning traffic)
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write # commits the updated satellites.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch fresh TLEs
        run: node tools/fetch-tles.mjs

      - name: Commit updated catalog (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/web/public/data/satellites.json
          git diff --cached --quiet || git commit -m "chore: refresh TLE data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
