name: Update ISS Today Log

on:
  schedule:
    # Daily at 12:07 UTC — offset from the top of the hour so this never
    # technically overlaps update-capsule-status.yml's hourly "0 * * * *" run.
    - cron: "7 12 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # commits the updated iss-today.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch ISS crew and activity, write iss-today.json
        run: node tools/update-iss-today.mjs

      - name: Commit updated iss-today.json (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add iss-today.json
          git diff --cached --quiet || git commit -m "chore: update ISS today log $(date -u +'%Y-%m-%d')"

          # Rebase onto whatever another scheduled job may have just pushed
          # (e.g. update-capsule-status.yml) and retry, instead of failing
          # outright on a losing push.
          for i in 1 2 3 4 5; do
            git pull --rebase origin main
            git push && break
          done
